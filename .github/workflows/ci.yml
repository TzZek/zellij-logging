name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test and build wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + wasm32-wasip1)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo registry, index, and target/
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo test (host target)
        run: cargo test --all-targets --verbose

      - name: cargo build --release --target wasm32-wasip1
        run: cargo build --release --target wasm32-wasip1

      - name: Install wasm-tools for export verification
        run: cargo install --quiet wasm-tools

      - name: Verify wasm exports _start (Zellij plugin ABI)
        run: |
          set -euo pipefail
          wasm=target/wasm32-wasip1/release/zellij_logging.wasm
          wasm-tools print --skeleton "$wasm" \
            | grep -E '\(export "_start"' \
            || { echo "ERROR: _start export missing in $wasm"; exit 1; }
          for fn in load update pipe render plugin_version; do
            wasm-tools print --skeleton "$wasm" \
              | grep -E "\(export \"$fn\"" \
              || { echo "ERROR: $fn export missing in $wasm"; exit 1; }
          done

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij_logging.wasm
          path: target/wasm32-wasip1/release/zellij_logging.wasm
          if-no-files-found: error

  release:
    name: Attach wasm to GitHub Release
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: zellij_logging.wasm
          path: dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zellij_logging.wasm
          fail_on_unmatched_files: true
